name = "ai-image-detector"
main = "worker/src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health"]

# 20 requests / 60s per key, mirroring the original express-rate-limit config
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 20
period = 60

# Set the real secret with: wrangler secret put ANTHROPIC_API_KEY
