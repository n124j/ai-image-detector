version: "3.9"

services:

  # ── Backend: Express API (Node.js) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_detector_backend
    restart: unless-stopped
    environment:
      PORT: "3001"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-*}"
      NODE_ENV: "${NODE_ENV:-production}"
    expose:
      - "3001"            # internal only — not published to host
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend: React (Vite build) served by nginx ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_detector_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-6001}:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge
